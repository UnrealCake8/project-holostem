<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HoloStem · Upload</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #080b10;
    --surface: #0e1318;
    --border: #1c2530;
    --accent: #00e5ff;
    --accent2: #7b61ff;
    --text: #e8f0f7;
    --muted: #4a6070;
    --success: #00ffb0;
    --error: #ff4d6d;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridDrift 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 60% 40%, rgba(123,97,255,0.07) 0%, transparent 60%),
                radial-gradient(ellipse at 30% 70%, rgba(0,229,255,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridDrift {
    0% { transform: translate(0, 0); }
    100% { transform: translate(40px, 40px); }
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .header {
    margin-bottom: 2.5rem;
    text-align: center;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }

  .logo-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    display: inline-block;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.6); }
  }

  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.8rem, 5vw, 2.4rem);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--text) 40%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header p {
    color: var(--muted);
    font-size: 0.8rem;
    margin-top: 0.5rem;
    letter-spacing: 0.05em;
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    background: var(--surface);
    animation: fadeUp 0.6s ease 0.2s both;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(0, 229, 255, 0.04);
  }

  .drop-zone.drag-over .drop-icon { transform: scale(1.15); }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    font-size: 2.8rem;
    margin-bottom: 1rem;
    transition: transform 0.25s ease;
    display: block;
    filter: drop-shadow(0 0 12px rgba(0,229,255,0.3));
  }

  .drop-zone h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 0.4rem;
  }

  .drop-zone p { color: var(--muted); font-size: 0.75rem; }

  .drop-zone .browse-hint {
    margin-top: 1rem;
    display: inline-block;
    border: 1px solid var(--accent2);
    color: var(--accent2);
    border-radius: 6px;
    padding: 0.35rem 0.9rem;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .file-preview {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.2rem;
    margin-top: 1rem;
    align-items: center;
    gap: 0.9rem;
    animation: fadeUp 0.3s ease both;
  }

  .file-preview.show { display: flex; }

  .file-thumb {
    width: 48px; height: 48px;
    border-radius: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
  }

  .file-info { flex: 1; min-width: 0; }
  .file-name {
    font-size: 0.8rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 0.2rem;
  }
  .file-size { font-size: 0.7rem; color: var(--muted); }

  .file-remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.1rem;
    padding: 0.2rem;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .file-remove:hover { color: var(--error); }

  .progress-wrap { display: none; margin-top: 1rem; animation: fadeUp 0.3s ease both; }
  .progress-wrap.show { display: block; }

  .progress-header {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .progress-bar-bg {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s ease;
    position: relative;
  }

  .progress-bar::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 40px;
    background: rgba(255,255,255,0.4);
    filter: blur(6px);
    animation: shimmer 1s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
  }

  .upload-btn {
    width: 100%;
    margin-top: 1.5rem;
    padding: 1rem;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 12px;
    color: #080b10;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 0.95rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    animation: fadeUp 0.6s ease 0.3s both;
  }

  .upload-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
  .upload-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .result {
    display: none;
    margin-top: 1.5rem;
    background: rgba(0, 255, 176, 0.06);
    border: 1px solid rgba(0, 255, 176, 0.2);
    border-radius: 14px;
    padding: 1.4rem;
    animation: fadeUp 0.4s ease both;
  }

  .result.show { display: block; }

  .result-label {
    font-size: 0.7rem;
    color: var(--success);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .result-label::before {
    content: '✓';
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--success);
    color: #080b10;
    font-size: 0.65rem;
    font-weight: 700;
  }

  .result-url-wrap { display: flex; gap: 0.6rem; align-items: stretch; }

  .result-url {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.65rem 0.9rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }

  .copy-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 0.9rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--success); color: var(--success); }

  .video-preview { margin-top: 1rem; border-radius: 10px; overflow: hidden; background: #000; display: none; }
  .video-preview.show { display: block; }
  .video-preview video { width: 100%; max-height: 240px; display: block; }

  .error-msg {
    display: none;
    margin-top: 1rem;
    background: rgba(255, 77, 109, 0.08);
    border: 1px solid rgba(255, 77, 109, 0.25);
    border-radius: 10px;
    padding: 0.9rem 1.1rem;
    font-size: 0.75rem;
    color: var(--error);
  }
  .error-msg.show { display: block; }

  .footer {
    margin-top: 2.5rem;
    text-align: center;
    font-size: 0.68rem;
    color: var(--muted);
    animation: fadeUp 0.6s ease 0.5s both;
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="logo"><span class="logo-dot"></span>HoloStem<span class="logo-dot"></span></div>
    <h1>Video Uploader</h1>
    <p>Upload an MP4 · Get a direct link · Done.</p>
  </div>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="video/mp4,video/webm,video/mov,video/*" />
    <span class="drop-icon">🎬</span>
    <h2>Drop your video here</h2>
    <p>MP4, WebM, MOV supported</p>
    <span class="browse-hint">Browse files</span>
  </div>

  <div class="file-preview" id="filePreview">
    <div class="file-thumb">🎞</div>
    <div class="file-info">
      <div class="file-name" id="fileName">—</div>
      <div class="file-size" id="fileSize">—</div>
    </div>
    <button class="file-remove" id="removeFile" title="Remove">✕</button>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-header">
      <span id="progressLabel">Uploading…</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <button class="upload-btn" id="uploadBtn" disabled>Upload Video</button>

  <div class="result" id="result">
    <div class="result-label">Upload complete</div>
    <div class="result-url-wrap">
      <div class="result-url" id="resultUrl"></div>
      <button class="copy-btn" id="copyBtn">Copy</button>
    </div>
    <div class="video-preview" id="videoPreview">
      <video controls id="previewPlayer"></video>
    </div>
  </div>
</div>

<div class="footer">
  Powered by Cloudinary · Free tier: 25GB storage / 25GB bandwidth · unrealcake8.online
</div>

<script>
  const CLOUD_NAME = 'devkrr7iy';
  const UPLOAD_PRESET = 'holostem';

  const dropZone     = document.getElementById('dropZone');
  const fileInput    = document.getElementById('fileInput');
  const filePreview  = document.getElementById('filePreview');
  const fileName     = document.getElementById('fileName');
  const fileSize     = document.getElementById('fileSize');
  const removeFile   = document.getElementById('removeFile');
  const uploadBtn    = document.getElementById('uploadBtn');
  const progressWrap = document.getElementById('progressWrap');
  const progressBar  = document.getElementById('progressBar');
  const progressPct  = document.getElementById('progressPct');
  const progressLabel= document.getElementById('progressLabel');
  const result       = document.getElementById('result');
  const resultUrl    = document.getElementById('resultUrl');
  const copyBtn      = document.getElementById('copyBtn');
  const errorMsg     = document.getElementById('errorMsg');
  const videoPreview = document.getElementById('videoPreview');
  const previewPlayer= document.getElementById('previewPlayer');

  let selectedFile = null;

  function formatBytes(bytes) {
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function setFile(file) {
    if (!file) return;
    selectedFile = file;
    fileName.textContent = file.name;
    fileSize.textContent = formatBytes(file.size);
    filePreview.classList.add('show');
    uploadBtn.disabled = false;
    result.classList.remove('show');
    errorMsg.classList.remove('show');
    progressWrap.classList.remove('show');
    videoPreview.classList.remove('show');
  }

  function clearFile() {
    selectedFile = null;
    fileInput.value = '';
    filePreview.classList.remove('show');
    uploadBtn.disabled = true;
    progressWrap.classList.remove('show');
    result.classList.remove('show');
    errorMsg.classList.remove('show');
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
  }

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) setFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) setFile(fileInput.files[0]);
  });

  removeFile.addEventListener('click', clearFile);

  uploadBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    const formData = new FormData();
    formData.append('file', selectedFile);
    formData.append('upload_preset', UPLOAD_PRESET);
    formData.append('resource_type', 'video');

    uploadBtn.disabled = true;
    progressWrap.classList.add('show');
    progressBar.style.width = '0%';
    progressPct.textContent = '0%';
    progressLabel.textContent = 'Uploading…';
    result.classList.remove('show');
    errorMsg.classList.remove('show');

    const xhr = new XMLHttpRequest();
    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`);

    xhr.upload.addEventListener('progress', e => {
      if (e.lengthComputable) {
        const pct = Math.round((e.loaded / e.total) * 100);
        progressBar.style.width = pct + '%';
        progressPct.textContent = pct + '%';
      }
    });

    xhr.addEventListener('load', () => {
      uploadBtn.disabled = false;
      if (xhr.status === 200) {
        const data = JSON.parse(xhr.responseText);
        const url = data.secure_url;
        progressLabel.textContent = 'Complete ✓';
        progressBar.style.width = '100%';
        progressPct.textContent = '100%';
        resultUrl.textContent = url;
        result.classList.add('show');
        previewPlayer.src = url;
        videoPreview.classList.add('show');
      } else {
        let errText = 'Upload failed.';
        try { errText = JSON.parse(xhr.responseText).error?.message || errText; } catch {}
        showError('❌ ' + errText);
        progressWrap.classList.remove('show');
        uploadBtn.disabled = false;
      }
    });

    xhr.addEventListener('error', () => {
      showError('❌ Network error. Check your internet connection.');
      progressWrap.classList.remove('show');
      uploadBtn.disabled = false;
    });

    xhr.send(formData);
  });

  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(resultUrl.textContent).then(() => {
      copyBtn.textContent = 'Copied!';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = 'Copy';
        copyBtn.classList.remove('copied');
      }, 2000);
    });
  });
</script>
</body>
</html>
